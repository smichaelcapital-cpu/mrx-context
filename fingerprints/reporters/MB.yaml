      rule: "Never inject `--` (double hyphen as em-dash)"
      evidence: "Zero occurrences across all 6 depos scanned (3 MB + 3 AD)"
      confidence: very_high
      application: "Stage 3 writer constrained to not output `--`. Post-process strip if generated."
